apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: news-cms-cluster
  region: ap-southeast-1
  version: "1.36"

availabilityZones:
  - ap-southeast-1a
  - ap-southeast-1b
  - ap-southeast-1c

iam:
  withOIDC: true

managedNodeGroups:
  - name: news-cms-nodes
    instanceType: t3.medium
    desiredCapacity: 1
    minSize: 1
    maxSize: 2

    volumeSize: 30
    volumeType: gp3

    privateNetworking: false

    labels:
      role: application
      project: news-cms

    tags:
      Project: news-cms
      Environment: production
      ManagedBy: eksctl

    iam:
      withAddonPolicies:
        imageBuilder: true
        autoScaler: true
        albIngress: true
        cloudWatch: true

    updateConfig:
      maxUnavailable: 1

cloudWatch:
  clusterLogging:
    enableTypes:
      - api
      - audit
      - authenticator
      - controllerManager
      - scheduler
