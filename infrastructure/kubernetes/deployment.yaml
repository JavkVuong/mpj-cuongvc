apiVersion: apps/v1
kind: Deployment
metadata:
  name: news-cms
  namespace: mpj-cuongvc
  labels:
    app.kubernetes.io/name: news-cms
    app.kubernetes.io/part-of: news-cms
spec:
  replicas: 1
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: news-cms
  template:
    metadata:
      labels:
        app.kubernetes.io/name: news-cms
        app.kubernetes.io/part-of: news-cms
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: news-cms
          image: 527055790396.dkr.ecr.ap-southeast-1.amazonaws.com/news-cms:5.2
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
          envFrom:
            - configMapRef:
                name: news-cms-config
          env:
            - name: PAYLOAD_SECRET
              valueFrom:
                secretKeyRef:
                  name: news-cms-secrets
                  key: PAYLOAD_SECRET
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: news-cms-secrets
                  key: DATABASE_URL
          resources:
            requests:
              cpu: 150m
              memory: 384Mi
            limits:
              cpu: 750m
              memory: 1Gi
          startupProbe:
            httpGet:
              path: /api/health
              port: http
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 36
          readinessProbe:
            httpGet:
              path: /api/ready
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          lifecycle:
            preStop:
              exec:
                command:
                  - sh
                  - -c
                  - sleep 10
